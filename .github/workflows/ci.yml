name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install StyLua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip -o stylua.zip
          unzip stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua

      - name: Check formatting
        run: stylua --check .

      - name: Check for backup files
        run: |
          found=$(find . -type f \( -name "*.bak" -o -name "*.old" -o -name "*.last" \) | head -20)
          if [ -n "$found" ]; then
            echo "❌ Backup files found:"
            echo "$found"
            exit 1
          fi
          echo "✅ No backup files found"

  syntax:
    name: Lua Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Validate Lua syntax
        run: |
          luacheck . \
            --no-color \
            --codes \
            --no-max-line-length \
            --globals wezterm \
            --only 0 \
            --no-unused \
            --exclude-files '.git/**' \
            --exclude-files 'lua_modules/**'
          echo "✅ All Lua files have valid syntax"

  release:
    name: Create Release
    needs: [lint, syntax]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGES=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s" --no-merges)
            COMPARE="**Full Changelog**: https://github.com/ca971/wezterm-enterprise/compare/${PREVIOUS_TAG}...${TAG}"
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
            COMPARE=""
          fi

          LUA_FILES=$(find . -name "*.lua" -not -path './.git/*' -not -path './lua_modules/*' | wc -l | tr -d ' ')
          LIB_COUNT=$(find lib -name "*.lua" 2>/dev/null | wc -l | tr -d ' ')

          cat > /tmp/release-notes.md << EOF
          <div align="center">

          # 🖥️ WezTerm Enterprise ${TAG}

          **Enterprise-Grade · Multi-Platform · Ultra-Modular Terminal Configuration**

          </div>

          ---

          ## ✨ Highlights

          | Feature | Details |
          |---|---|
          | 🏗️ **Architecture** | Modular Lua configuration system |
          | 🎨 **Theming** | Dynamic themes with hot-reload |
          | ⌨️ **Keybindings** | Structured, discoverable key mappings |
          | 🌐 **Platform** | macOS · Linux · Windows · WSL |
          | ⚡ **Performance** | Optimized startup, lazy-loaded modules |

          ---

          ## 📋 What's Changed

          ${CHANGES}

          ---

          ## 📦 Quick Install

          \`\`\`bash
          cp -r ~/.config/wezterm ~/.config/wezterm.bak 2>/dev/null
          git clone https://github.com/ca971/wezterm-enterprise.git ~/.config/wezterm
          \`\`\`

          ---

          ## 📊 Stats

          | Metric | Value |
          |---|---|
          | Lua files | ${LUA_FILES} |
          | Library modules | ${LIB_COUNT} |
          | WezTerm required | Latest stable |

          ---

          ${COMPARE}

          <div align="center">

          **Crafted with ❤️ by [ca971](https://github.com/ca971)**

          </div>
          EOF

          sed -i 's/^          //' /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.version.outputs.tag }} — WezTerm Enterprise"
          body_path: /tmp/release-notes.md
          make_latest: true
